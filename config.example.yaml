# S3 Email TUI Viewer Configuration
# Copy this file to ~/.config/s3emailclient/config.yaml and customize

# S3 Configuration (required)
bucket_name: "my-email-bucket"
region: "us-east-1"

# AWS Profile (optional - uses default if not specified)
# aws_profile: "my-profile"

# UI Configuration (optional - defaults shown)
list_pane_width: 40  # Percentage of screen width for email list (10-90)
refresh_rate: 100    # UI refresh rate in milliseconds (minimum 10)

# Behavior Configuration (optional - defaults shown)
cache_emails: true   # Cache parsed emails in memory
max_cache_size: 50   # Maximum number of emails to cache
